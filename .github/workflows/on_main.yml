name: Main

on:
  push:
    branches:
      - main
      
permissions:
  contents: write
  pull-requests: write

jobs:
  # Release Please to create releases
  release:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      # fromJSON to convert string "true"/"false" to boolean - doesn't match what's in release-please docs
      # https://github.com/googleapis/release-please-action/issues/912#issuecomment-2024459449
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_GITHUB_TOKEN }}

  # Always run checks
  checks:
    name: Checks
    uses: ./.github/workflows/reusable_checks.yml
    secrets: inherit

  # Upload crates to crates.io if a release was created
  upload:
    name: Upload
    needs: [checks, release]
    runs-on: ubuntu-latest
    if: ${{ fromJSON(needs.release.outputs.releases_created) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Rust toolchain and cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.91
        
      - name: Publish crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --workspace --exclude factrs-bench
